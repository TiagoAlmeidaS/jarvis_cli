version: '3.8'

services:
  # Qdrant Vector Database para RAG
  qdrant:
    image: qdrant/qdrant:latest
    container_name: jarvis-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ollama (já existente - mantido para referência)
  ollama:
    image: ollama/ollama:latest
    container_name: jarvis-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (para cache e sessões)
  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL (para dados persistentes - alternativa ao SQLite)
  # Mais adequado que SQLite para acesso remoto
  postgres:
    image: postgres:15-alpine
    container_name: jarvis-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: jarvis
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarvis_secure_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Adminer (UI para gerenciar PostgreSQL)
  adminer:
    image: adminer:latest
    container_name: jarvis-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # Jarvis Daemon - automação autônoma (SEO, métricas, propostas)
  jarvis-daemon:
    build:
      context: ./jarvis-rs
      dockerfile: daemon/Dockerfile
    image: jarvis-daemon:latest
    container_name: jarvis-daemon
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - JARVIS_DAEMON_DB=/home/jarvis/.jarvis/daemon.db
      - RUST_LOG=${RUST_LOG:-jarvis_daemon=info}
    volumes:
      - jarvis_daemon_data:/home/jarvis/.jarvis
    # Monte credentials/ se tiver google.json (OAuth)
    # volumes:
    #   - ./credentials:/home/jarvis/.jarvis/credentials:ro

volumes:
  qdrant_storage:
    driver: local
  ollama_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  jarvis_daemon_data:
    driver: local

networks:
  default:
    name: jarvis-network
