model = "gpt-4o"
model_provider = "azure-openai"

# Consider setting [mcp_servers] here!

# Azure OpenAI Provider Configuration
[model_providers.azure-openai]
name = "Azure OpenAI"
base_url = "https://bml-openai-agents.openai.azure.com/openai"
env_key = null
env_http_headers = { "api-key" = "AZURE_OPENAI_API_KEY" }
wire_api = "responses"
query_params = { "api-version" = "2024-08-01-preview" }
uses_chat_completions_api = true
request_max_retries = 4
stream_max_retries = 10
stream_idle_timeout_ms = 300000

# Agent Loop Configuration
# Azure OpenAI suporta function calling nativo, então podemos usar modo "auto"
# ou "native" para melhor performance
[agent_loop]
mode = "auto"  # Detecta automaticamente se precisa usar agent loop ou function calling nativo
base_url = "https://bml-openai-agents.openai.azure.com/openai"  # Azure OpenAI endpoint
api_key = "env:AZURE_OPENAI_API_KEY"  # Lê de AZURE_OPENAI_API_KEY environment variable
# model não precisa ser especificado - usa o model principal (gpt-4o)
temperature = 0.7
max_tokens = 4096
max_iterations = 25  # Máximo de iterações Think→Execute→Observe
timeout_sec = 300  # 5 minutos máximo
max_context_tokens = 32000  # Antes de compactar contexto

# GitHub Integration Configuration
[github]
# Name of the secret in jarvis-secrets where the GitHub PAT is stored.
# Defaults to "GITHUB_PAT" if not specified.
# This is only used if GITHUB_PAT or JARVIS_GITHUB_PAT environment variables are not set.
# IMPORTANT: This is the NAME of the secret, NOT the token value itself!
pat_secret_name = "GITHUB_PAT"

# Base URL for GitHub API. Defaults to "https://api.github.com" if not specified.
# Use this for GitHub Enterprise Server:
# api_base_url = "https://github.example.com/api/v3"
api_base_url = "https://api.github.com"